##############################################################
# MML Skill: decision_log
# Kuvaus: Hallitsee DECISION_LOG.csv-päätösrivejä repokohtaisesti
#         tai canonical-integraaatiorepossa.
# Versio: 1.0.0
# Päivitetty: 2026-07-04
##############################################################

skill:
  name: decision_log
  version: "1.0.0"
  description: >
    Lisää ja muokkaa päätösrivejä DECISION_LOG.csv-tiedostoon
    yhdessä tai useammassa repossa. Canonical-loki sijaitsee
    jira-github-integration-repossa; muut repot peilaavat sitä.

# ─── Repokonfiguraatio ──────────────────────────────────────
repos:
  canonical:
    owner: uutisseuranta
    repo: jira-github-integration
    path: DECISION_LOG.csv
    branch: main
    role: canonical          # Tähän kirjoitetaan aina ensisijaisesti

  mirrors:
    - owner: uutisseuranta
      repo: patterns
      path: DECISION_LOG.csv
      branch: main
      role: mirror           # Kopioidaan canonical-muutoksen jälkeen
      source_repo: patterns

    - owner: uutisseuranta
      repo: bq-activitystreams
      path: DECISION_LOG.csv
      branch: main
      role: mirror
      source_repo: bq-activitystreams

# ─── CSV-skeema ─────────────────────────────────────────────
schema:
  columns:
    - id           # D-NNN, kasvava numero (täytetään automaattisesti)
    - date         # YYYY-MM-DD (täytetään automaattisesti)
    - title        # Lyhyt otsikko (pakollinen)
    - decision     # Päätöksen kuvaus suomeksi (pakollinen)
    - rationale    # Perustelut, miksi päätös tehtiin (pakollinen)
    - affects_issues # "#N, #M" -muodossa tai tyhjä

  id_format: "D-{NNN}"      # Kolme numeroa, täydennetään etunollilla
  date_format: "YYYY-MM-DD"
  encoding: utf-8
  delimiter: ","
  quoting: minimal           # Lainausmerkit vain jos kenttä sisältää pilkkuja/rivinvaihtoja

# ─── Komennot ───────────────────────────────────────────────
commands:

  add:
    description: >
      Lisää uusi päätösrivi. ID ja päivämäärä generoidaan automaattisesti.
      Oletuksena kirjoitetaan vain canonical-repoon. mirror=true kopioi
      muutoksen myös kaikkiin mirror-repoihin.
    parameters:
      title:
        type: string
        required: true
        description: Lyhyt otsikko (< 80 merkkiä)
      decision:
        type: string
        required: true
        description: Päätöksen kuvaus
      rationale:
        type: string
        required: true
        description: Miksi päätös tehtiin
      affects_issues:
        type: string
        required: false
        default: ""
        description: 'Esim. "#1, #7, #8"'
      target:
        type: enum
        values: [canonical, all]
        default: canonical
        description: >
          canonical = kirjoitetaan vain jira-github-integration-repoon.
          all = kirjoitetaan canonical + kopioidaan kaikkiin mirror-repoihin.
      date:
        type: string
        required: false
        default: today
        description: 'Ohittaa automaattisen päivämäärän, muoto YYYY-MM-DD'
    steps:
      - action: fetch_file
        repo: canonical
        description: Haetaan nykyinen DECISION_LOG.csv, lasketaan seuraava ID
      - action: append_row
        description: Lisätään uusi rivi loppuun (ei otsikoiden jälkeen välittömästi)
      - action: commit
        repo: canonical
        message: "decision: add {id} – {title}"
      - action: if_target_all
        then:
          - action: copy_file
            from: canonical
            to: mirrors
            message: "chore: sync DECISION_LOG.csv from canonical ({id})"

  edit:
    description: >
      Muokkaa olemassa olevaa päätösriviä ID:n perusteella.
      Kaikki parametrit ovat valinnaisia – vain annetut kentät päivitetään.
    parameters:
      id:
        type: string
        required: true
        description: 'Esim. "D-007"'
      title:
        type: string
        required: false
      decision:
        type: string
        required: false
      rationale:
        type: string
        required: false
      affects_issues:
        type: string
        required: false
      target:
        type: enum
        values: [canonical, all]
        default: canonical
    steps:
      - action: fetch_file
        repo: canonical
      - action: find_row_by_id
        id_column: id
      - action: update_fields
        description: Päivitetään vain annetut kentät, muut jätetään ennalleen
      - action: commit
        repo: canonical
        message: "decision: edit {id} – {changed_fields}"
      - action: if_target_all
        then:
          - action: copy_file
            from: canonical
            to: mirrors
            message: "chore: sync DECISION_LOG.csv from canonical (edit {id})"

  show:
    description: Tulostaa yhden päätösrivin tai koko lokin luettavassa muodossa.
    parameters:
      id:
        type: string
        required: false
        description: 'Jos annettu, näyttää vain ko. rivin. Muuten koko loki.'
      repo:
        type: enum
        values: [canonical, patterns, bq-activitystreams]
        default: canonical
    steps:
      - action: fetch_file
        repo: "{{repo}}"
      - action: render_table
        format: markdown

  sync:
    description: >
      Kopioi canonical-lokin kaikkiin mirror-repoihin (esim. jos
      peilaus on jäänyt jälkeen).
    parameters:
      dry_run:
        type: boolean
        default: false
        description: Jos true, näyttää mitä tehtäisiin ilman että kirjoittaa.
    steps:
      - action: fetch_file
        repo: canonical
      - action: compare_sha
        repos: mirrors
        description: Vertaa SHA – jos sama, ohitetaan
      - action: copy_file
        from: canonical
        to: mirrors
        message: "chore: sync DECISION_LOG.csv from canonical"
        skip_if_same_sha: true

# ─── Automaattiset kentät ────────────────────────────────────
auto_fields:
  id:
    strategy: increment
    pattern: "D-{NNN}"
    pad: 3
    source: last_row_id     # Luetaan viimeisen rivin ID:stä
  date:
    strategy: today         # ISO 8601, UTC

# ─── Commit-viestimallit ─────────────────────────────────────
commit_templates:
  add:  "decision: add {id} – {title}"
  edit: "decision: edit {id} – {changed_fields}"
  sync: "chore: sync DECISION_LOG.csv from canonical"

# ─── Rajoitukset & huomiot ───────────────────────────────────
constraints:
  - Rivejä ei koskaan poisteta – vain muokataan tai merkitään vanhentuneiksi
  - Canonical-repo on aina ensijainen kirjoituskohde
  - Mirror-repot päivitetään aina canonical-muutoksen yhteydessä kun target=all
  - CSV-header ei koskaan muutu (id,date,title,decision,rationale,affects_issues)
  - Kenttien sisäiset pilkut ja rivinvaihdot ympäröidään lainausmerkeillä

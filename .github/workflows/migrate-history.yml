name: Migrate GitHub Issues to Jira

on:
  workflow_dispatch:
    inputs:
      project_key:
        description: 'Jira project key (esim. US, PROJ, NEWS)'
        required: true
        default: 'US'
      repo:
        description: 'GitHub repo jonka issuet migroidaan (esim. uutisseuranta.github.io)'
        required: true
        default: 'uutisseuranta.github.io'
      dry_run:
        description: 'Dry run - ei luo Jira-issueja, vain tulostaa mitä luotaisiin'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run migration
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ inputs.project_key }}
          GITHUB_REPO: ${{ inputs.repo }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: python scripts/migrate-history.py

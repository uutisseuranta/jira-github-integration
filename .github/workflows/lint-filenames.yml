# lint-filenames.yml — valvoo tiedostonimien kebab-case-konventiota automaattisesti
# CODE_CONVENTIONS määrittelee kebab-case-nimeämisen kaikille tiedostoille
# jotka eivät ole normatiivisia sopimusdokumentteja (SCREAMING_SNAKE_CASE.md) tai README/LICENSE.
# Tämä workflow on ainoa automaattinen esto — ilman sitä konventiota valvoo vain koodikatselmointi.
# Viite: CODE_CONVENTIONS.md — Tiedostojen nimeäminen; issue #22.

name: Lint filenames

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-filenames:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tarkista että tiedostonimet noudattavat kebab-case-konventiota
        run: |
          ALLOWED_SCREAMING="CODE_CONVENTIONS.md|DECISION_LOG.csv|DECISION_PROCESS.md|DESIGN_GUIDELINES.md|TECHNICAL_DESIGN.md|README.md|LICENSE|CODEOWNERS"

          # -maxdepth 1 rajaa tarkistuksen juureen: .github/-kansion workflowt
          # noudattavat omaa kebab-case-konventiotaan eikä niitä tule sekoittaa
          # juuren tiedostojen tarkistukseen.
          VIOLATIONS=$(find . -maxdepth 1 -type f \
            | sed 's|^./||' \
            | grep '_' \
            | grep -vE "^(${ALLOWED_SCREAMING})$" \
            || true)

          if [ -n "$VIOLATIONS" ]; then
            echo "CODE_CONVENTIONS-rikkomus: seuraavat tiedostot käyttävät snake_case-nimeämistä:"
            echo "$VIOLATIONS"
            echo ""
            echo "Korjaa: nimeä tiedosto kebab-case-muotoon (esim. my_file.py → my-file.py)."
            echo "Ks. CODE_CONVENTIONS.md — Tiedostojen nimeäminen."
            exit 1
          fi

          echo "OK: kaikki tiedostonimet noudattavat konventiota."

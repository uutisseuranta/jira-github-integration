# Miksi tämä workflow on olemassa:
# CODE_CONVENTIONS määrittelee kebab-case-nimeamiskonvention kaikille tiedostoille
# jotka eivät ole normatiivisia sopimusdokumentteja (SCREAMING_SNAKE_CASE.md) tai
# README/LICENSE. Tämä workflow valvoo konventiota automaattisesti jokaisessa
# pushissa ja PR:ssä, jotta manuaalinen koodikatselmointi ei ole ainoa esto.
# Viite: CODE_CONVENTIONS.md — Tiedostojen nimeäminen; issue #22.

name: Lint filenames

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-filenames:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tarkista että tiedostonimet noudattavat kebab-case-konventiota
        # Säännöt (CODE_CONVENTIONS.md):
        #   OK  : kebab-case.ext, SCREAMING_SNAKE_CASE.md, README.md, LICENSE
        #   FAIL: snake_case.ext, camelCase.ext, PascalCase.ext
        # Tarkistus: etsitään tiedostoja joiden nimessä on alaviiva (snake_case)
        # ja jotka eivät ole sallittuja SCREAMING_SNAKE_CASE-poikkeuksia.
        run: |
          ALLOWED_SCREAMING="CODE_CONVENTIONS.md|DECISION_LOG.csv|DECISION_PROCESS.md|DESIGN_GUIDELINES.md|TECHNICAL_DESIGN.md|README.md|LICENSE|CODEOWNERS"

          # Etsitään kaikki tiedostot juuressa (ei .github/ alla)
          VIOLATIONS=$(find . -maxdepth 1 -type f \
            | sed 's|^./||' \
            | grep '_' \
            | grep -vE "^(${ALLOWED_SCREAMING})$" \
            || true)

          if [ -n "$VIOLATIONS" ]; then
            echo "CODE_CONVENTIONS-rikkomus: seuraavat tiedostot käyttävät snake_case-nimeämistä:"
            echo "$VIOLATIONS"
            echo ""
            echo "Korjaa: nimeä tiedosto kebab-case-muotoon (esim. my_file.py → my-file.py)."
            echo "Ks. CODE_CONVENTIONS.md — Tiedostojen nimeäminen."
            exit 1
          fi

          echo "OK: kaikki tiedostonimet noudattavat konventiota."

# deploy-integration.yml — synkronoi jira-webhook-relay.yml organisaation muihin repoihin
# Keskitetty hallinta: relay-tiedosto muutetaan vain tässä repossa, ja tämä workflow
# levittää muutoksen automaattisesti. Ilman tätä jokainen repo vaatisi manuaalisen päivityksen.
# Käynnistyy: push (kun relay-tiedosto muuttuu main-haarassa) tai manuaalisesti (workflow_dispatch).
# Manuaalinen käynnistys on tarkoitettu pakkosynkronointiin — esim. jos kohderepo on jäänyt jälkeen.

name: Deploy Integration Workflows

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/jira-webhook-relay.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Run Rules Validation Tests
        # Varmistetaan ennen levitystä, että relay-tiedosto on eheä.
        # Virhe tässä estää rikkinäisen version leviämisen kaikkiin repoihin.
        run: python3 test-rules.py

      - name: Deploy to Target Repositories
        env:
          ORG_PAT: ${{ secrets.ORG_PAT }}
        run: |
          TARGET_REPOS=(
            "uutisseuranta.github.io"
            "patterns"
            "bq-activitystreams"
            "skills"
            "ops"
          )

          # URL-uudelleenkirjoitus estää PAT-tokenin vuotamisen virhelokeihin:
          # git clone kirjoittaa epäonnistuneen URL:n logiin — ilman tätä token näkyisi selkotekstinä.
          git config --global url."https://x-access-token:${ORG_PAT}@github.com/".insteadOf "https://github.com/"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          for REPO in "${TARGET_REPOS[@]}"; do
            echo "Deploying to uutisseuranta/$REPO..."

            git clone "https://github.com/uutisseuranta/$REPO.git" "$REPO-dir"
            mkdir -p "$REPO-dir/.github/workflows"
            cp .github/workflows/jira-webhook-relay.yml "$REPO-dir/.github/workflows/jira-webhook-relay.yml"

            cd "$REPO-dir"
            # git status --porcelain on tyhjä jos tiedosto on identtinen — skipataan turha commit.
            if [ -n "$(git status --porcelain)" ]; then
              git add .github/workflows/jira-webhook-relay.yml
              git commit -m "chore(ci): deploy updated jira-webhook-relay.yml from central repo"
              # HEAD:main eksplisiittisesti, jotta push ei riipu kohderepon oletushaarasta.
              git push origin HEAD:main
              echo "Changes pushed to uutisseuranta/$REPO."
            else
              echo "No changes needed for uutisseuranta/$REPO."
            fi
            cd ..
            rm -rf "$REPO-dir"
          done
